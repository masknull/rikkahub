name: Build Android Release APK

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Generate signing keystore (CI-only)
        shell: bash
        run: |
          set -euo pipefail

          # Use a deterministic CI password to avoid keytool/gradle password mismatch issues.
          # (User asked: do not use custom/generated key each run)
          STORE_PASS="rikkahub"
          KEY_PASS="$STORE_PASS"
          KEY_ALIAS="rikkahub"

          echo "STORE_PASS=$STORE_PASS" >> $GITHUB_ENV
          echo "KEY_PASS=$KEY_PASS" >> $GITHUB_ENV
          echo "KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV

          # Generate once, then copy to multiple likely locations to satisfy different Gradle path resolutions
          mkdir -p app app/app app/app/app

          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keystore app/app.key \
            -storepass "$STORE_PASS" \
            -keypass "$KEY_PASS" \
            -alias "$KEY_ALIAS" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 36500 \
            -dname "CN=masknull, OU=CI, O=masknull, L=Shanghai, S=Shanghai, C=CN"

          cp -f app/app.key app/app/app.key
          cp -f app/app.key app/app/app/app.key

      - name: Write local.properties signing config
        shell: bash
        run: |
          set -euo pipefail
          cat > local.properties <<EOF
          storeFile=app/app.key
          storePassword=${STORE_PASS}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASS}
          EOF

      - name: Create minimal google-services.json (CI)
        shell: bash
        run: |
          set -euo pipefail
          cat > app/google-services.json <<'EOF'
          {"project_info":{"project_number":"0","project_id":"placeholder"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0000000000000000","android_client_info":{"package_name":"me.rerere.rikkahub"}},"api_key":[{"current_key":"placeholder"}]}],"configuration_version":"1"}
          EOF

      - name: Gradle Build (release, arm64-v8a only)
        run: |
          set -euo pipefail
          chmod +x gradlew
          ./gradlew :app:assembleRelease -Pandroid.injected.build.abi=arm64-v8a

          echo "=== APK outputs (project) ==="
          find . -maxdepth 8 -type f -path "*/build/outputs/*" -name "*.apk" -print || true
          echo "=== outputs tree (apk) ==="
          find . -maxdepth 6 -type d -path "*/build/outputs*" -print || true
          echo "==========================="

      - name: Package APKs into zip (like earlier)
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          # Collect any apk under the repo (project output paths vary by AGP)
          mapfile -t apks < <(find . -type f -name "*.apk" -path "*/build/outputs/*" -print || true)

          if [ "${#apks[@]}" -eq 0 ]; then
            echo "No APKs found under */build/outputs/*. This is unexpected."
            find . -type f -name "*.apk" -print || true
            exit 1
          fi

          printf '%s\n' "${apks[@]}"
          cp -f "${apks[@]}" dist/
          ls -lah dist

          (cd dist && zip -r "rikkahub-release-apks.zip" .)
          ls -lah dist/rikkahub-release-apks.zip

      - name: Upload artifact (zip)
        uses: actions/upload-artifact@v4
        with:
          name: rikkahub-release-apks
          path: dist/rikkahub-release-apks.zip
          retention-days: 7

      - name: Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          name: ${{ github.ref_name }} - õ┐«ÕżŹÕŹÅĶ««Õż┤Ķ”åńø¢ķŚ«ķóś
          body: |
            õ┐«ÕżŹÕŹÅĶ««Õż┤Ķ”åńø¢ķŚ«ķóś
            - õ┐«ÕżŹńĮæń╗£Õ▒éµŗ”µł¬ÕÖ©Ķ”åńø¢µśŠÕ╝Å Content-Type ńÜäķŚ«ķóś
            - ńÄ░Õ£©’╝ÜÕĘ▓µīćÕ«Ü Content-Type µŚČõĖŹÕåŹĶ”åńø¢’╝īõ╗ģÕ£©µ£¬µīćÕ«ÜµŚČÕüÜÕ┐ģĶ”üÕĮÆõĖĆÕī¢
